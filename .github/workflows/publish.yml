name: Publish Kecare

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish-kecare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install 

      - name: Publish packages
        run: bun run .commands/scripts/ci/publish-ci.ts

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "Build or publish failed. Cleaning up..."
          rm -rf dist/ || true
